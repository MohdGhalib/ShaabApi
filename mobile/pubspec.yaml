name: shaab_app
description: تطبيق الشعب - نظام المنتسيات
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # شبكة واستيثاق
  http: ^1.2.0
  shared_preferences: ^2.2.2
  local_auth: ^2.2.0

  # كاميرا وصور
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # واجهة
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
